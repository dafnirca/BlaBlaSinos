<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>BlaBlaSinos - Cadastro</title>

    <link
        rel="stylesheet"
        href="css/cadastro.css"
    >

</head>

<body>

    <div class="cadastro-container">

        <div class="cadastro-card">

            <h1>BlaBlaSinos</h1>

            <p class="subtitle">
                Criar nova conta
            </p>

            <form id="cadastro-form">

                <div class="input-group">

                    <label for="nome">
                        Nome completo
                    </label>

                    <input
                        type="text"
                        id="nome"
                        placeholder="Digite seu nome"
                        required
                    >

                </div>

                <div class="input-group">

                    <label for="email">
                        E-mail institucional
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="seuemail@edu.unisinos.br"
                        required
                    >

                </div>

                <div class="input-group">

                    <label for="senha">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha"
                        required
                    >

                </div>

                <div class="input-group">

                    <label for="confirmarSenha">
                        Confirmar senha
                    </label>

                    <input
                        type="password"
                        id="confirmarSenha"
                        placeholder="Confirme sua senha"
                        required
                    >

                </div>

                <button type="submit">
                    Cadastrar
                </button>

            </form>

            <p class="login-link">

                Já possui conta?

                <a href="login.html">
                    Entrar
                </a>

            </p>

        </div>

    </div>

    <script src="js/cadastro.js"></script>

</body>

</html>
