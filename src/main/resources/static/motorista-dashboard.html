<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlaBlaSinos - Dashboard do Motorista</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .dashboard-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .menu-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: none;
            font-size: 16px;
            font-weight: 600;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .menu-card .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .menu-card .title {
            display: block;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .menu-card .subtitle {
            display: block;
            font-size: 12px;
            opacity: 0.9;
        }

        .logout-section {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }

        .logout-btn {
            padding: 10px 24px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }

        .perfil-btn {
            padding: 10px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.3s;
            text-decoration: none;
        }

        .perfil-btn:hover {
            background-color: #2980b9;
        }

        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-container {
                padding: 24px;
            }

            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>🚗 Dashboard do Motorista</h1>
            <p>Gerencie suas caronas e solicitações de passageiros</p>
        </div>

        <div class="menu-grid">
            <a href="gerenciar-caronas.html" class="menu-card">
                <div class="icon">🚙</div>
                <span class="title">Minhas Caronas</span>
                <span class="subtitle">Ofereça e gerencie caronas</span>
            </a>

            <a href="solicitacoes.html" class="menu-card">
                <div class="icon">📋</div>
                <span class="title">Solicitações</span>
                <span class="subtitle">Aceite ou recuse pedidos</span>
            </a>

            <a href="perfil.html" class="menu-card">
                <div class="icon">👤</div>
                <span class="title">Meu Perfil</span>
                <span class="subtitle">Edite suas informações</span>
            </a>

            <a href="buscar-caronas.html" class="menu-card">
                <div class="icon">🔍</div>
                <span class="title">Buscar Caronas</span>
                <span class="subtitle">Procure por caronas disponíveis</span>
            </a>
        </div>

        <div class="logout-section">
            <a href="perfil.html" class="perfil-btn">← Voltar ao Perfil</a>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const motoristaId = localStorage.getItem('userId');
            if (!motoristaId) {
                window.location.href = 'login.html';
            }
        });

        function logout() {
            if (confirm('Tem certeza que deseja sair?')) {
                localStorage.removeItem('userId');
                localStorage.removeItem('userEmail');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
