<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlaBlaSinos - Dashboard do Motorista</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/header.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--color-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--color-text);
        }

        .dashboard-container {
            background: var(--color-surface);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(2,6,23,0.6);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            color: var(--color-text);
        }

        .header { text-align: center; margin-bottom: 40px; }

        .header h1 { color: var(--color-text); font-size: 28px; margin-bottom: 8px; }

        .header p { color: var(--color-muted); font-size: 14px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }

        .menu-card {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-600) 100%);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: var(--color-on-primary);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: none;
            font-size: 16px;
            font-weight: 600;
        }

        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(79,70,229,0.3); }

        .menu-card .icon { font-size: 40px; margin-bottom: 12px; }
        .menu-card .title { display: block; font-size: 18px; margin-bottom: 4px; }
        .menu-card .subtitle { display: block; font-size: 12px; opacity: 0.95; }

        .logout-section { display: flex; gap: 12px; justify-content: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--color-border); }

        .logout-btn {
            padding: 10px 24px;
            background-color: var(--color-danger);
            color: var(--color-on-primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        .logout-btn:hover { filter: brightness(0.9); }

        .perfil-btn {
            padding: 10px 24px;
            background-color: var(--color-primary);
            color: var(--color-on-primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.3s;
            text-decoration: none;
        }

        .perfil-btn:hover { filter: brightness(0.95); }

        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: 1fr; }
            .dashboard-container { padding: 24px; }
            .header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <div class="dashboard-container">
        <div class="header">
            <h1>🚗 Dashboard do Motorista</h1>
            <p>Gerencie suas caronas e solicitações de passageiros</p>
        </div>

        <div class="menu-grid">
            <a href="gerenciar-caronas.html" class="menu-card">
                <div class="icon">🚙</div>
                <span class="title">Minhas Caronas</span>
                <span class="subtitle">Ofereça e gerencie caronas</span>
            </a>

            <a href="solicitacoes.html" class="menu-card">
                <div class="icon">📋</div>
                <span class="title">Solicitações</span>
                <span class="subtitle">Aceite ou recuse pedidos</span>
            </a>

            <a href="perfil.html" class="menu-card">
                <div class="icon">👤</div>
                <span class="title">Meu Perfil</span>
                <span class="subtitle">Edite suas informações</span>
            </a>

            <a href="buscar-caronas.html" class="menu-card">
                <div class="icon">🔍</div>
                <span class="title">Buscar Caronas</span>
                <span class="subtitle">Procure por caronas disponíveis</span>
            </a>
        </div>

    </div>

    <script src="js/header.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const motoristaId = localStorage.getItem('userId');
            if (!motoristaId) {
                window.location.href = 'login.html';
            }
        });

        function logout() {
            if (confirm('Tem certeza que deseja sair?')) {
                localStorage.removeItem('userId');
                localStorage.removeItem('userEmail');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
