<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlaBlaSinos - Minhas Caronas</title>
    <link rel="stylesheet" href="css/gerenciar-caronas.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/header.css">
</head>
<body>
    <div id="site-header"></div>
    <div class="main-container">
        <h1>Minhas Caronas</h1>
        <div class="nav-buttons">
            <a href="solicitacoes.html" class="btn-nav">Ver Solicitações</a>
            <a href="perfil.html" class="btn-nav">Voltar ao Perfil</a>
        </div>
        <div class="card">
            <div class="card-header">
                <h2>Caronas Oferecidas</h2>
                <button id="btn-adicionar-carona">Oferecer Nova Carona</button>
            </div>
            <div class="table-wrapper">
                <table id="caronas-table" class="hidden">
                    <thead>
                        <tr>
                            <th>Destino</th>
                            <th>Data e Hora</th>
                            <th>Vagas</th>
                            <th>Valor (R$)</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="caronas-list">
                        <!-- Linhas da tabela serão inseridas aqui -->
                    </tbody>
                </table>
                <p id="empty-state" class="empty-state">Você ainda não ofereceu nenhuma carona.</p>
            </div>
        </div>
    </div>

    <!-- Modal para Adicionar/Editar Carona -->
    <!-- CORREÇÃO: Usamos a classe 'hidden' para controlar a visibilidade -->
    <div id="carona-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modal-title">Oferecer Nova Carona</h2>
            <form id="carona-form">
                <input type="hidden" id="carona-id">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="origem">Origem</label>
                        <input type="text" id="origem" placeholder="Ex: Campus Unisinos" required>
                    </div>
                    <div class="input-group">
                        <label for="destino">Destino</label>
                        <input type="text" id="destino" placeholder="Ex: Centro de Porto Alegre" required>
                    </div>
                    <div class="input-group">
                        <label for="data">Data</label>
                        <input type="date" id="data" required>
                    </div>
                    <div class="input-group">
                        <label for="hora">Hora</label>
                        <input type="time" id="hora" required>
                    </div>
                    <div class="input-group">
                        <label for="vagas">Total de Vagas</label>
                        <input type="number" id="vagas" min="1" max="4" placeholder="Ex: 3" required>
                    </div>
                    <div class="input-group">
                        <label for="valor">Valor por Passageiro (R$)</label>
                        <input type="number" id="valor" min="0" step="0.50" placeholder="Ex: 5.00">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="btn-cancelar-modal">Cancelar</button>
                    <button type="submit" id="btn-salvar-carona">Salvar Carona</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/notifications.js"></script>
    <script src="js/header.js"></script>
    <script src="js/gerenciar-caronas.js"></script>
</body>
</html>
