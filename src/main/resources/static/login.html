<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>BlaBlaSinos - Login</title>

    <link rel="stylesheet" href="css/theme.css">

    <link
        rel="stylesheet"
        href="css/login.css"
    >

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>BlaBlaSinos</h1>

            <p class="subtitle">
                Entre na sua conta
            </p>

            <form id="login-form">

                <div class="input-group">

                    <label for="email">
                        E-mail institucional
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="seuemail@edu.unisinos.br"
                        required
                    >

                </div>

                <div class="input-group">

                    <label for="senha">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha"
                        required
                    >

                </div>

                <button type="submit">
                    Entrar
                </button>

            </form>

            <p class="register-link">

                Não possui conta?

                <a href="cadastro.html">
                    Cadastre-se
                </a>

            </p>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
