    <div class="perfil-container">

        <h1>Meu Perfil</h1>

        <form id="perfil-form">

            <div class="card">

                <h2>Dados pessoais</h2>

                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" id="nome">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>

            </div>

            <div class="card">

                <h2>CNH</h2>

                <div class="input-group">
                    <label>Número da CNH</label>
                    <input type="text" id="cnh">
                </div>

                <div class="input-group">
                    <label>Categoria</label>

                    <select id="categoria">
                        <option>A</option>

                        <option>C</option>
                        <option>D</option>
                        <option>E</option>
                    </select>
                </div>

            </div>

            <div class="card">

                <h2>Veículo</h2>

                <div class="input-group">
                    <label>Marca</label>
                    <input type="text" id="marca">
                </div>

                <div class="input-group">
                    <label>Modelo</label>
                    <input type="text" id="modelo">
                </div>

                <div class="input-group">
                    <label>Cor</label>
                    <input type="text" id="cor">
                </div>

                <div class="input-group">
                    <label>Placa</label>
                    <input type="text" id="placa">
                </div>

                <div class="input-group">
                    <label>Vagas</label>
                    <input
                        type="number"
                        id="vagas"
                        min="1"
                        max="8"
                    >
                </div>

            </div>

            <button type="submit">
                Salvar Alterações
            </button>

            <div class="secondary-action">
                <a href="buscar-caronas.html">Buscar caronas</a>
            </div>

        </form>

    </div>
